<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root{
  --bg        : #fff5f5;
  --bg2       : #ffffff;
  --bg3       : #fef2f2;
  --accent    : #dc2626;
  --accent-lt : #fef2f2;
  --accent-dk : #b91c1c;
  --accent-xlt: #fff5f5;
  /* Semantic */
  --green     : #16a34a;  --green-lt : #f0fdf4;
  --blue      : #3b82f6;  --blue-lt  : #eff6ff;
  --amber     : #d97706;  --amber-lt : #fffbeb;
  --purple    : #7c3aed;  --purple-lt: #f5f3ff;
  --cyan      : #0891b2;  --cyan-lt  : #ecfeff;
  --teal      : #0d9488;  --teal-lt  : #f0fdfa;
  /* Structure */
  --border    : #e4e8ef;
  --border2   : #d0d7e3;
  --text      : #0f172a;
  --text2     : #475569;
  --text3     : #94a3b8;
  --shadow-sm : 0 1px 3px rgba(0,0,0,.06);
  --shadow    : 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg : 0 8px 32px rgba(0,0,0,.12);
  --r         : 14px;
  --fh        : 'Sora', sans-serif;
  --fm        : 'JetBrains Mono', monospace;
  --fb        : 'Plus Jakarta Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes shake   {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes dotPop  {0%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slideIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}

/* ── LOGIN SCREEN ───────────────────────────────────── */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#fff5f5,#f8f9fb,#fff);padding:24px;
}
.login-card{
  background:#fff;border:1px solid var(--border);border-radius:24px;
  padding:44px 36px;width:100%;max-width:390px;
  box-shadow:var(--shadow-lg);animation:fadeUp .4s ease;
}
.login-card.shake{animation:shake .4s ease}

/* Logo */
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.login-logo{
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-weight:800;font-size:22px;color:#fff;
  box-shadow:0 8px 28px rgba(220,38,38,.28);letter-spacing:.5px;
}
.login-title{font-family:var(--fh);font-size:24px;font-weight:700;color:var(--text)}
.login-sub  {font-size:13px;color:var(--text3);text-align:center;line-height:1.5}
.role-pill  {
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent-lt);border:1px solid rgba(220,38,38,.25);
  color:var(--accent);border-radius:20px;padding:5px 14px;
  font-family:var(--fm);font-size:11px;font-weight:700;
  letter-spacing:.5px;margin-top:4px;
}

/* Form */
.form-group {margin-bottom:18px}
.form-label {font-size:11px;font-family:var(--fm);letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:block;text-transform:uppercase}
.form-input,.form-select{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 15px;color:var(--text);
  font-family:var(--fb);font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none;
}
.form-input:focus,.form-select:focus{
  border-color:var(--accent);background:#fff;
  box-shadow:0 0 0 3px rgba(220,38,38,.1);
}
.form-input.pin-field{font-family:var(--fm);font-size:22px;text-align:center;letter-spacing:.3em}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* PIN dots */
.pin-dots{display:flex;gap:10px;justify-content:center;margin:4px 0 20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s ease}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);animation:dotPop .2s ease}

/* Button */
.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border:none;border-radius:14px;color:#fff;
  font-family:var(--fh);font-size:17px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 20px rgba(220,38,38,.3);
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.login-error{
  background:var(--accent-lt);border:1px solid rgba(220,38,38,.2);
  border-radius:10px;padding:11px 14px;font-size:13px;color:var(--accent);
  margin-top:12px;animation:fadeIn .2s ease;text-align:center;
}

/* ── APP SHELL ──────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh}
.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;height:56px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-sm);flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;letter-spacing:.5px;
}
.brand-name{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--text)}
.brand-role{
  font-family:var(--fm);font-size:10px;letter-spacing:.5px;
  padding:3px 9px;border-radius:20px;
}
/* Role-specific header badge colors */
.brand-role.ADMIN      {color:var(--accent);background:var(--accent-lt);border:1px solid rgba(220,38,38,.2)}
.brand-role.SUPERVISOR {color:var(--purple);background:var(--purple-lt);border:1px solid rgba(124,58,237,.2)}
.brand-role.OPS_MANAGER{color:var(--amber);background:var(--amber-lt);border:1px solid rgba(217,119,6,.2)}

.hdr-right{display:flex;align-items:center;gap:8px}
.staff-badge{font-family:var(--fm);font-size:11px;color:var(--text2);background:var(--bg3);padding:5px 10px;border-radius:8px;border:1px solid var(--border)}
.city-badge{
  font-family:var(--fm);font-size:10px;font-weight:700;
  color:var(--accent);background:var(--accent-lt);
  padding:4px 9px;border-radius:20px;
  border:1px solid rgba(220,38,38,.2);letter-spacing:.5px;
}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);cursor:pointer;padding:5px 10px;font-size:12px;font-family:var(--fb);transition:all .15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── BOTTOM NAV ─────────────────────────────────────── */
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);height:60px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);overflow-x:auto}
.ni{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--fb);font-weight:600;transition:color .2s;padding:0;white-space:nowrap}
.ni .ico{font-size:18px}
.ni.on{color:var(--accent)}

/* ── PAGES ──────────────────────────────────────────── */
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding-bottom:80px}
.page.on{display:block;animation:fadeIn .2s ease}

/* ── DASHBOARD ──────────────────────────────────────── */
.dash-wrap{padding:16px}
.dash-greeting{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:2px}
.dash-date{font-size:12px;color:var(--text3);font-family:var(--fm);margin-bottom:16px}
.dash-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.dash-card-icon{font-size:20px;margin-bottom:8px}
.dash-card-val{font-family:var(--fh);font-size:30px;font-weight:800;line-height:1}
.dash-card.red   .dash-card-val{color:var(--accent)}
.dash-card.green .dash-card-val{color:var(--green)}
.dash-card.amber .dash-card-val{color:var(--amber)}
.dash-card.purple.dash-card-val{color:var(--purple)}
.dash-card-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* Role access card */
.role-access-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:12px;
  box-shadow:var(--shadow-sm);animation:slideIn .3s ease;
}
.role-access-title{font-family:var(--fh);font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.access-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.access-row:last-child{border-bottom:none}
.access-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.access-label{font-size:13px;color:var(--text);flex:1;font-weight:500}
.access-badge{
  font-size:10px;font-family:var(--fm);font-weight:700;
  padding:2px 8px;border-radius:20px;
}
.access-badge.full   {background:var(--green-lt);color:var(--green);border:1px solid #86efac}
.access-badge.view   {background:var(--blue-lt);color:var(--blue);border:1px solid #bfdbfe}
.access-badge.limited{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}

/* Session card */
.session-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);animation:slideIn .4s ease}
.session-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.session-row:last-child{border-bottom:none}
.session-label{font-size:11px;color:var(--text3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.5px}
.session-value{font-size:12px;color:var(--text);font-family:var(--fm);font-weight:500}
.token-active{font-size:11px;color:var(--green);font-family:var(--fm);font-weight:600;display:flex;align-items:center;gap:4px}
.token-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}

/* Coming soon */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.coming-soon-icon{width:64px;height:64px;background:var(--accent-lt);border:1px solid rgba(220,38,38,.2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px}
.coming-soon-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:8px}
.coming-soon-sub{font-size:13px;color:var(--text3);line-height:1.6;max-width:280px}

/* Spinner */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* Toast */
.toast-wrap{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:400;animation:fadeUp .25s ease}
.toast-inner{background:var(--text);color:#fff;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:500;white-space:nowrap;box-shadow:var(--shadow-lg);font-family:var(--fb)}
.toast-inner.success{background:var(--green)}
.toast-inner.error  {background:var(--accent)}
.toast-inner.warning{background:var(--amber)}

/* Loading */
.load-overlay{position:fixed;inset:0;background:rgba(255,245,245,.92);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.load-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.load-text{font-family:var(--fm);font-size:13px;color:var(--text2)}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/api.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Api = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('client_id', CONFIG.CLIENT_ID);
    Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, String(v)));
    const res  = await fetch(url.toString());
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/session.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SessionStore = {
  save(data) { try { localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(data)); } catch {} },
  load() {
    try {
      const raw = localStorage.getItem(CONFIG.SESSION_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      const parts = (s.token||'').split('|');
      if (parts.length !== 5 || Date.now() > parseInt(parts[4])) { this.clear(); return null; }
      return s;
    } catch { return null; }
  },
  clear() { try { localStorage.removeItem(CONFIG.SESSION_KEY); } catch {} }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/utils.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Utils = {
  getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  },
  getDateStr() {
    return new Date().toLocaleDateString('en-IN', {
      weekday:'long', day:'numeric', month:'long', year:'numeric'
    });
  },
  sanitizePin: (v) => String(v).replace(/\D/g,'').slice(0,4),
  firstName:   (n) => (n||'').split(' ')[0],
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useToast.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type='error') => setToast({ msg, type }), []);
  const hide = useCallback(() => setToast(null), []);
  return { toast, showToast: show, hideToast: hide };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useAuth.js
//  KEY DIFFERENCE: accepts ADMIN, SUPERVISOR, OPS_MANAGER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useAuth({ onSuccess, onError }) {
  const [loading, setLoading] = useState(false);
  const login = useCallback(async (city, staffId, pin) => {
    setLoading(true);
    try {
      const data = await Api.get({
        action:  'login',
        city:    city,
        staffId: String(staffId).trim().toUpperCase(),
        pin:     pin.trim()
      });
      if (!CONFIG.ALLOWED_ROLES.includes(data.role)) {
        throw new Error('Access denied. Admin roles only.');
      }
      const session = {
        token:     data.token,
        staffId:   data.staffId,
        staffName: data.staffName,
        role:      data.role,
        city:      data.city,
        clientId:  data.clientId,
        loginAt:   Date.now()
      };
      SessionStore.save(session);
      onSuccess(session);
    } catch (e) {
      const msg = e.message.includes('Invalid')  ? 'Invalid Staff ID or PIN'
                : e.message.includes('attempts') ? 'Too many attempts. Wait 10 min.'
                : e.message.includes('denied')   ? 'Access denied. Admin roles only.'
                : e.message || 'Login failed';
      onError(msg);
    } finally { setLoading(false); }
  }, [onSuccess, onError]);
  return { login, loading };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useTokenRefresh.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useTokenRefresh(session, onExpired) {
  const timerRef = useRef(null);
  useEffect(() => {
    if (!session) return;
    timerRef.current = setInterval(async () => {
      try {
        const data = await Api.get({
          action: 'login', city: session.city,
          staffId: session.staffId, token: session.token
        });
        SessionStore.save({ ...session, token: data.token, loginAt: Date.now() });
      } catch { onExpired(); }
    }, CONFIG.REFRESH_MS);
    return () => clearInterval(timerRef.current);
  }, [session]);
}

//  📁 components/ui/Toast.jsx

    }
  }, [pin, staffId]);

        <div className="login-logo-wrap">

          <div className="login-title">Admin Console</div>

              onChange={e => setCity(e.target.value)} disabled={loading}>
              <option value="CBE">Coimbatore (CBE)</option>
              <option value="CHN">Chennai (CHN)</option>
            </select>
          </div>
        </div>

        {/* Staff ID */}
        <div className="form-group">
          <label className="form-label">Staff ID</label>
          <input className="form-input" type="text" value={staffId}
            onChange={e => setStaffId(e.target.value.toUpperCase())}
            onKeyDown={e => e.key==='Enter' && handleSubmit()}
            placeholder="e.g. AD_001" autoCapitalize="characters"
            autoCorrect="off" spellCheck={false} disabled={loading} />
        </div>

        {/* PIN */}
        <div className="form-group" style={{marginBottom:8}}>
          <label className="form-label">PIN</label>
          <input className="form-input pin-field" type="password"
            inputMode="numeric" pattern="[0-9]*" maxLength={4} value={pin}
            onChange={e => setPin(Utils.sanitizePin(e.target.value))}
            onKeyDown={e => e.key==='Enter' && handleSubmit()}
            placeholder="• • • •" disabled={loading} />
        </div>

        <PinDots length={pin.length} />

        <button className="btn-login" onClick={handleSubmit} disabled={loading}>
          {loading ? <><div className="spinner"/><span>Signing in...</span></> : 'Sign In →'}
        </button>

        {error && <div className="login-error">{error}</div>}
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/page.jsx — Root auth gate
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const App = () => {
  const [session,  setSession]  = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const saved = SessionStore.load();
    if (saved) setSession(saved);
    setChecking(false);
  }, []);

  if (checking) return (
    <div className="load-overlay">
      <div className="load-spinner"/>
      <div className="load-text">CollectPro loading...</div>
    </div>
  );

  return session
    ? <AppShell session={session} onLogout={() => setSession(null)} />
    : <LoginCard onLogin={s => setSession(s)} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
