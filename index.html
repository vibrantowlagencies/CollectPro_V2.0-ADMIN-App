<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#fff5f5;--bg2:#fff;--bg3:#fef2f2;
  --accent:#dc2626;--accent-lt:#fef2f2;--accent-dk:#b91c1c;
  --green:#16a34a;--green-lt:#f0fdf4;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --amber:#d97706;--amber-lt:#fffbeb;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --teal:#0d9488;--teal-lt:#f0fdfa;
  --border:#e4e8ef;--border2:#d0d7e3;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:14px;
  --fh:'Sora',sans-serif;--fm:'JetBrains Mono',monospace;--fb:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}

@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes shake   {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes dotPop  {0%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slideIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#fff5f5,#f8f9fb,#fff);padding:24px}
.login-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:44px 36px;width:100%;max-width:390px;box-shadow:var(--shadow-lg);animation:fadeUp .4s ease}
.login-card.shake{animation:shake .4s ease}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.login-title{font-family:var(--fh);font-size:24px;font-weight:700}
.login-sub{font-size:13px;color:var(--text3);text-align:center;line-height:1.5}
.role-pill{display:inline-flex;align-items:center;gap:6px;background:var(--accent-lt);border:1px solid rgba(220,38,38,.25);color:var(--accent);border-radius:20px;padding:5px 14px;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.5px;margin-top:4px}
.form-group{margin-bottom:18px}
.form-label{font-size:11px;font-family:var(--fm);letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:block;text-transform:uppercase}
.form-input,.form-select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;color:var(--text);font-family:var(--fb);font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.form-input.pin-field{font-family:var(--fm);font-size:22px;text-align:center;letter-spacing:.3em}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:4px 0 20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);animation:dotPop .2s ease}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border:none;border-radius:14px;color:#fff;font-family:var(--fh);font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(220,38,38,.3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.login-error{background:var(--accent-lt);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--accent);margin-top:12px;text-align:center;animation:fadeIn .2s ease}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;letter-spacing:.5px}
.brand-name{font-family:var(--fh);font-size:16px;font-weight:700}
.brand-role{font-family:var(--fm);font-size:10px;color:var(--accent);background:var(--accent-lt);padding:3px 9px;border-radius:20px;border:1px solid rgba(220,38,38,.2);letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.city-badge{font-family:var(--fm);font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-lt);padding:4px 9px;border-radius:20px;border:1px solid rgba(220,38,38,.2);letter-spacing:.5px}
.staff-badge{font-family:var(--fm);font-size:11px;color:var(--text2);background:var(--bg3);padding:5px 10px;border-radius:8px;border:1px solid var(--border)}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);cursor:pointer;padding:5px 10px;font-size:12px;font-family:var(--fb);transition:all .15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── NAV ── */
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);height:60px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--fb);font-weight:600;transition:color .2s;padding:0;position:relative}
.ni .ico{font-size:18px}
.ni.on{color:var(--accent)}
.nav-dot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2)}

/* ── PAGES ── */
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding-bottom:80px}
.page.on{display:block;animation:fadeIn .2s ease}

/* ── SHARED COMPONENTS ── */
.wrap{padding:16px}
.section-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.card-title{font-family:var(--fh);font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.row-val{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--text)}
.row-val.green{color:var(--green)}
.row-val.red{color:var(--accent)}
.row-val.amber{color:var(--amber)}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm)}
.stat-icon{font-size:18px;margin-bottom:6px}
.stat-val{font-family:var(--fh);font-size:26px;font-weight:800;line-height:1}
.stat-val.red{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.stat-val.purple{color:var(--purple)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.badge{font-size:10px;font-family:var(--fm);font-weight:700;padding:2px 8px;border-radius:20px}
.badge.green{background:var(--green-lt);color:var(--green);border:1px solid #86efac}
.badge.red{background:var(--accent-lt);color:var(--accent);border:1px solid rgba(220,38,38,.3)}
.badge.amber{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}
.badge.blue{background:var(--blue-lt);color:var(--blue);border:1px solid #bfdbfe}
.badge.purple{background:var(--purple-lt);color:var(--purple);border:1px solid #ddd6fe}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border:none;border-radius:var(--r);color:#fff;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(220,38,38,.25);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-secondary{width:100%;padding:12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text2);font-family:var(--fh);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-secondary:active{transform:scale(.98)}
.btn-excel{width:100%;padding:13px;background:linear-gradient(135deg,#166534,#15803d);border:none;border-radius:var(--r);color:#fff;font-family:var(--fh);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all .2s}
.btn-excel:active{transform:scale(.98)}
.toggle-wrap{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);height:34px}
.toggle-opt{padding:0 14px;border:none;font-family:var(--fm);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:var(--text3)}
.toggle-opt.on{background:var(--accent);color:#fff}
.toggle-opt.on.green{background:var(--green)}
.toggle-opt.on.amber{background:var(--amber)}
.warn-banner{display:flex;align-items:flex-start;gap:10px;background:var(--amber-lt);border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-bottom:10px;animation:slideIn .3s ease}
.warn-banner-text{font-size:12px;color:var(--amber);line-height:1.5;font-weight:500}
.warn-codes{font-family:var(--fm);font-size:11px;color:var(--amber);margin-top:3px;word-break:break-all}
.alert-card{display:flex;align-items:flex-start;gap:10px;border-radius:12px;padding:12px 14px;margin-bottom:10px;animation:slideIn .3s ease}
.alert-card.red{background:var(--accent-lt);border:1px solid rgba(220,38,38,.25)}
.alert-card.amber{background:var(--amber-lt);border:1px solid #fde68a}
.alert-card.green{background:var(--green-lt);border:1px solid #86efac}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-title{font-size:13px;font-weight:700;margin-bottom:2px}
.alert-card.red .alert-title{color:var(--accent)}
.alert-card.amber .alert-title{color:var(--amber)}
.alert-card.green .alert-title{color:var(--green)}
.alert-sub{font-size:11px;color:var(--text3);line-height:1.5}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}

/* ── UPLOAD TAB ── */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);margin-bottom:16px;position:relative}
.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-lt)}
.upload-zone.has-file{border-color:var(--green);border-style:solid;background:var(--green-lt)}
.upload-zone-icon{font-size:36px;margin-bottom:10px}
.upload-zone-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:4px}
.upload-zone.has-file .upload-zone-title{color:var(--green)}
.upload-zone-sub{font-size:12px;color:var(--text3)}
.upload-zone.has-file .upload-zone-sub{color:var(--green);font-weight:600}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-info{display:flex;align-items:center;gap:10px;background:var(--green-lt);border:1px solid #86efac;border-radius:10px;padding:10px 14px;margin-bottom:14px;animation:slideIn .3s ease}
.file-name{font-size:13px;font-weight:700;color:var(--green);flex:1;word-break:break-all}
.file-rows{font-family:var(--fm);font-size:11px;color:var(--green)}
.file-clear{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:6px}
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.config-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.config-row:last-child{border-bottom:none}
.config-row.col{flex-direction:column;align-items:flex-start;gap:8px}
.config-label{font-size:13px;font-weight:600;color:var(--text)}
.config-sub{font-size:11px;color:var(--text3);margin-top:2px}
.batch-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:var(--fm);font-size:13px;outline:none;transition:all .2s}
.batch-input:focus{border-color:var(--accent);background:#fff}
.progress-wrap{margin-bottom:20px}
.progress-label{font-size:12px;font-family:var(--fm);color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between}
.progress-bar-outer{height:8px;background:var(--border);border-radius:6px;overflow:hidden}
.progress-bar-inner{height:8px;border-radius:6px;transition:width .4s ease;background:linear-gradient(90deg,var(--accent),var(--accent-dk))}
.progress-step{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:6px;text-align:center}

/* ── QUALITY REPORT ── */
.qr-hero{border-radius:var(--r);padding:18px;margin-bottom:14px;animation:slideIn .3s ease}
.qr-hero.excellent{background:linear-gradient(135deg,var(--green-lt),#dcfce7);border:1px solid #86efac}
.qr-hero.good     {background:linear-gradient(135deg,var(--teal-lt),#ccfbf1);border:1px solid #5eead4}
.qr-hero.average  {background:linear-gradient(135deg,var(--amber-lt),#fef9c3);border:1px solid #fde68a}
.qr-hero.poor     {background:var(--accent-lt);border:1px solid rgba(220,38,38,.25)}
.qr-hero-label{font-size:11px;font-family:var(--fm);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.qr-hero.excellent .qr-hero-label{color:var(--green)}
.qr-hero.good      .qr-hero-label{color:var(--teal)}
.qr-hero.average   .qr-hero-label{color:var(--amber)}
.qr-hero.poor      .qr-hero-label{color:var(--accent)}
.qr-score{font-family:var(--fh);font-size:48px;font-weight:800;line-height:1;margin-bottom:4px}
.qr-hero.excellent .qr-score{color:var(--green)}
.qr-hero.good      .qr-score{color:var(--teal)}
.qr-hero.average   .qr-score{color:var(--amber)}
.qr-hero.poor      .qr-score{color:var(--accent)}
.qr-msg{font-size:13px;font-weight:600}
.qr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.qr-stat{background:var(--bg2);padding:12px 8px;text-align:center}
.qr-stat-val{font-family:var(--fh);font-size:22px;font-weight:800;line-height:1}
.qr-stat-val.g{color:var(--green)}
.qr-stat-val.r{color:var(--accent)}
.qr-stat-val.a{color:var(--amber)}
.qr-stat-lbl{font-size:10px;font-family:var(--fm);color:var(--text3);margin-top:3px;text-transform:uppercase}
.qr-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.qr-bar-label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0;font-weight:500}
.qr-bar-outer{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.qr-bar-inner{height:7px;border-radius:4px;transition:width .5s ease}
.qr-bar-count{font-family:var(--fm);font-size:11px;font-weight:700;width:30px;text-align:right;flex-shrink:0}

/* ── BATCH HISTORY ── */
.batch-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow-sm)}
.batch-score-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:800;flex-shrink:0}
.batch-score-circle.excellent{background:var(--green-lt);color:var(--green);border:2px solid #86efac}
.batch-score-circle.good     {background:var(--teal-lt);color:var(--teal);border:2px solid #5eead4}
.batch-score-circle.average  {background:var(--amber-lt);color:var(--amber);border:2px solid #fde68a}
.batch-score-circle.poor     {background:var(--accent-lt);color:var(--accent);border:2px solid rgba(220,38,38,.3)}
.batch-info{flex:1}
.batch-no{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text)}
.batch-meta{font-size:11px;color:var(--text3);font-family:var(--fm);margin-top:2px}
.batch-stats{text-align:right}
.batch-workable{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--green)}
.batch-rejected{font-size:11px;color:var(--accent);font-family:var(--fm)}

/* ── TEAM TAB ── */
.lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow-sm);animation:slideIn .3s ease}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;font-family:var(--fh)}
.lb-rank.r1{background:var(--amber-lt);color:var(--amber)}
.lb-rank.r2{background:#f1f5f9;color:var(--text2)}
.lb-rank.r3{background:#fff7ed;color:#9a3412}
.lb-rank.rx{background:var(--bg3);color:var(--text3)}
.lb-info{flex:1}
.lb-name{font-size:13px;font-weight:700;color:var(--text)}

/* ── PENDING TAB ── */
.filter-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}

.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-family:var(--fm);border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}

.issue-type-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none}

.it-chip{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:11px;font-family:var(--fm);border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .2s}
.it-chip.on{background:var(--accent-lt);border-color:rgba(220,38,38,.4);color:var(--accent);font-weight:700}
.issue-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);animation:slideIn .3s ease}
.issue-type-badge{display:inline-block;font-size:10px;font-family:var(--fm);font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.issue-type-badge.JBOX  {background:var(--purple-lt);color:var(--purple);border:1px solid #ddd6fe}

.issue-type-badge.RECONNECTION{background:var(--teal-lt);color:var(--teal);border:1px solid #99f6e4}

.issue-remark{font-size:11px;color:var(--text3);font-style:italic;background:var(--bg3);border-radius:8px;padding:6px 10px;margin:8px 0;border-left:2px solid var(--border2)}
.issue-date{font-size:11px;font-family:var(--fm);color:var(--text3)}
.resolve-btn{padding:7px 14px;border-radius:8px;border:1.5px solid #86efac;background:var(--green-lt);color:var(--green);font-family:var(--fh);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}

.release-btn:active{transform:scale(.95)}
.rollover-preview{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.rollover-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}

/* ── CONFIRM SHEET ── */

.confirm-proceed{flex:1;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border:none;border-radius:12px;font-family:var(--fh);font-size:15px;font-weight:700;color:#fff;cursor:pointer}

/* ── TOAST + LOADERS ── */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spinner-sm{width:16px;height:16px;border-width:2px;border-color:rgba(220,38,38,.15);border-top-color:var(--accent)}
.toast-wrap{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:400;animation:fadeUp .25s ease}
.toast-inner{background:var(--text);color:#fff;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:500;white-space:nowrap;box-shadow:var(--shadow-lg);font-family:var(--fb)}
.toast-inner.success{background:var(--green)}
.toast-inner.error  {background:var(--accent)}
.toast-inner.warning{background:var(--amber)}
.load-overlay{position:fixed;inset:0;background:rgba(255,245,245,.92);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.load-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/constants.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CONFIG = {
  API_URL:       'https://script.google.com/macros/s/AKfycbyRb7oEMdppJKouU5xCAQVq-IauFaugqXslscYChoFaXkvWzIQzHCg9q5u3AZWAlxB_Pg/exec',
  CLIENT_ID:     'VOA_CBE',
  SESSION_KEY:   'voa_session_admin',
  REFRESH_MS:    25 * 60 * 1000,
  ALLOWED_ROLES: ['ADMIN','SUPERVISOR','OPS_MANAGER'],
  CITIES:        ['CBE','CHN'],
};

const NAV_TABS = [
  { id:'home',    icon:'🏠', label:'Home'    },
  { id:'upload',  icon:'📤', label:'Upload'  },
  { id:'team',    icon:'👥', label:'Team'    },
  { id:'pending', icon:'📋', label:'Pending' },
  { id:'issues',  icon:'⚠️', label:'Issues'  },
  { id:'control', icon:'⚙️', label:'Control' },
];

const ISSUE_TYPES = [
  { id:'ALL',              label:'All'         },
  { id:'ISSUE_JBOX',       label:'J-Box'       },
  { id:'ISSUE_REFUND',     label:'Refund'      },
  { id:'ISSUE_MAIL',       label:'Mail Confirm'},
  { id:'ISSUE_RECONNECTION',label:'Reconnect' },
  { id:'ISSUE_ADDR',       label:'Addr Change' },
];

const ISSUE_SHORT = {
  ISSUE_JBOX:'JBOX', ISSUE_REFUND:'REFUND', ISSUE_MAIL:'MAIL',
  ISSUE_RECONNECTION:'RECONNECTION', ISSUE_ADDR:'ADDR'
};

const STATUS_LABELS = {
  FRESH:'Fresh',CALLED:'Called',APPT_FIXED:'Appt Fixed',
  NOT_VISITED:'Not Visited',RESCHEDULED:'Rescheduled',NOT_REACHABLE:'Not Reachable',
  STRIKE_1:'Strike 1',STRIKE_2:'Strike 2',STRIKE_3:'Strike 3',
  ISSUE_REFUND:'Refund Issue',ISSUE_RECONNECTION:'Reconnection',
  ISSUE_MAIL:'Mail Confirm',ISSUE_JBOX:'JBox Issue',ISSUE_ADDR:'Addr Change',
  COOLING:'Cooling',COOLING_POOL:'Cooling Pool',
};

const COLUMN_MAP = {
  accountNo: ['account no','accountno','account_no','account number','acct no'],
  name:      ['name','customer name','customername','customer_name'],
  mobile:    ['mobile','mobile no','mobileno','mobile_no','phone','contact'],
  address:   ['address','full address','addr'],
  area:      ['area','locality','zone'],
  fxCode:    ['fx code','fx_code','fxcode','fx name','fx_name','area code'],
  srNumber:  ['sr number','sr_number','srnumber','sr no'],
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/api.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Api = {
  async get(p) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('client_id', CONFIG.CLIENT_ID);
    Object.entries(p).forEach(([k,v]) => url.searchParams.append(k, String(v)));
    const r = await fetch(url.toString());
    if (!r.ok) throw new Error('Network error');
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Request failed');
    return j.data;
  },
  async post(body) {
    const r = await fetch(CONFIG.API_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ client_id: CONFIG.CLIENT_ID, ...body })
    });
    if (!r.ok) throw new Error('Network error');
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Request failed');
    return j.data;
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/session.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SS = {
  save(d){try{localStorage.setItem(CONFIG.SESSION_KEY,JSON.stringify(d))}catch{}},
  load(){try{const r=localStorage.getItem(CONFIG.SESSION_KEY);if(!r)return null;const s=JSON.parse(r);const p=(s.token||'').split('|');if(p.length!==5||Date.now()>parseInt(p[4])){this.clear();return null;}return s;}catch{return null;}},
  clear(){try{localStorage.removeItem(CONFIG.SESSION_KEY)}catch{}}
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/utils.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Utils = {
  greeting(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';},
  dateStr(){return new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});},
  pin:(v)=>String(v).replace(/\D/g,'').slice(0,4),
  name1:(n)=>(n||'').split(' ')[0],
  initials:(n)=>(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
  hoursAgo(iso){if(!iso)return 0;return Math.round((Date.now()-new Date(iso).getTime())/3600000);},
  fmtHours(h){if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';},
  genBatch(city){const d=new Date();const m=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];return city+'_'+m+'_'+d.getFullYear()+'_1';},
  today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');},
  qualityClass(score){if(score>=90)return'excellent';if(score>=75)return'good';if(score>=50)return'average';return'poor';},
  qualityLabel(score){if(score>=90)return'Excellent';if(score>=75)return'Good';if(score>=50)return'Average';return'Poor';},
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/xlsxParser.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseExcel(file) {
  return new Promise((res, rej) => {
    const rd = new FileReader();
    rd.onload = (e) => {
      try {
        const wb  = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
        if (!raw.length) { rej(new Error('File is empty')); return; }
        const findCol = (variants) => Object.keys(raw[0]).find(h => variants.includes(h.toLowerCase().trim()));
        const cm = {};
        Object.entries(COLUMN_MAP).forEach(([f,v]) => { const c=findCol(v); if(c) cm[f]=c; });
        const rows = raw.map(r => {
          const g = (f) => cm[f] ? String(r[cm[f]]||'').trim() : '';
          return { accountNo:g('accountNo'), name:g('name'), mobile:g('mobile'), address:g('address'), area:g('area'), fxCode:g('fxCode'), srNumber:g('srNumber') };
        }).filter(r => r.accountNo);
        res({ rows, total: raw.length, mapped: rows.length });
      } catch(err) { rej(new Error('Parse failed: '+err.message)); }
    };
    rd.onerror = () => rej(new Error('File read failed'));
    rd.readAsArrayBuffer(file);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/excelExport.js
//  Generates downloadable Excel files for ACT reporting
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ExcelExport = {

  // ACT Base Quality Report
  downloadQualityReport(result, batchHistory) {
    const wb = XLSX.utils.book_new();
    const today = new Date().toLocaleDateString('en-IN');

    // Sheet 1: Summary
    const summary = [
      ['CollectPro — ACT Base Quality Report'],
      ['Generated:', today],
      [''],
      ['Batch No', result.batchNo],
      ['City', result.city || 'CBE'],
      ['Total Uploaded', result.total],
      ['Workable', result.workable],
      ['Rejected', result.rejected],
      ['Quality Score', (result.quality?.score || 0) + '%'],
      ['Quality Label', result.quality?.label || ''],
      [''],
      ['--- REJECTION BREAKDOWN ---'],
      ['Missing Account No',      result.breakdown?.missingNo     || 0],
      ['Bad Format',              result.breakdown?.badFormat     || 0],
      ['Duplicate in Batch',      result.breakdown?.dupInBatch    || 0],
      ['Matched Historic Memory', result.breakdown?.historicMatch || 0],
      ['Already in Pipeline',     result.breakdown?.pendingMatch  || 0],
      [''],
      ['--- ALLOCATION ---'],
      ['TC Allocated',   result.tcAllocated   || 0],
      ['Exec Allocated', result.execAllocated || 0],
      ['Exec Skipped',   result.execSkipped   || 0],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Summary');

    // Sheet 2: Rejected accounts (if available)
    if (result.rejectedRows && result.rejectedRows.length > 0) {
      const rejHeaders = [['Account No','Name','Mobile','Area','City','Batch No','Reject Reason','Rejected At']];
      const rejData = result.rejectedRows.map(r => [r[0],r[1],r[2],r[4],r[5],r[7],r[8],r[9]]);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([...rejHeaders,...rejData]), 'Rejected Accounts');
    }

    // Sheet 3: Batch History
    if (batchHistory && batchHistory.length > 0) {
      const histHeaders = [['Batch No','City','Total','Workable','Rejected','Quality Score','Pushed By','Date']];
      const histData    = batchHistory.map(b => [b.batchNo,b.city,b.total,b.workable,b.rejected,b.score+'%',b.pushedBy,b.date]);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([...histHeaders,...histData]), 'Batch History');
    }

    XLSX.writeFile(wb, 'CollectPro_ACT_Base_Quality_Report_' + (result.batchNo||'') + '.xlsx');
  },

  // ACT Issues Report
  downloadIssuesReport(issues) {
    const wb    = XLSX.utils.book_new();
    const today = new Date().toLocaleDateString('en-IN');

    // Sheet 1: Summary by type
    const counts = {};
    ISSUE_TYPES.slice(1).forEach(t => { counts[t.id] = 0; });
    issues.forEach(i => { if (counts[i.issueType] !== undefined) counts[i.issueType]++; });

    const summary = [
      ['CollectPro — ACT Issues Report'],
      ['Generated:', today],
      ['Total Open Issues:', issues.length],
      [''],
      ['Issue Type', 'Count'],
      ['Junction Box (JBox)',    counts['ISSUE_JBOX']         || 0],
      ['Refund Pending',         counts['ISSUE_REFUND']       || 0],
      ['Mail Confirmation',      counts['ISSUE_MAIL']         || 0],
      ['Reconnection Request',   counts['ISSUE_RECONNECTION'] || 0],
      ['Address Change',         counts['ISSUE_ADDR']         || 0],
      [''],
      ['Note: Please resolve these issues from your end to enable router recovery.'],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Issue Summary');

    // Sheet 2: All issues
    const headers = [['Issue ID','Account No','Customer','Mobile','Area','City','Issue Type','TC Remark','Status','Created At']];
    const rows    = issues.map(i => [i.issueId||'',i.accountNo||'',i.customerName||'',i.mobile||'',i.area||'',i.city||'',i.issueType||'',i.tcRemark||'',i.status||'',i.createdAt||'']);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([...headers,...rows]), 'All Issues');

    // Sheet 3: JBox issues only (strongest proof for ACT)
    const jboxIssues = issues.filter(i => i.issueType === 'ISSUE_JBOX');
    if (jboxIssues.length > 0) {
      const jRows = jboxIssues.map(i => [i.issueId||'',i.accountNo||'',i.customerName||'',i.mobile||'',i.area||'',i.tcRemark||'',i.createdAt||'']);
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        [['Junction Box Issues — ACT Responsibility']],
        [['Account No','Customer','Mobile','Area','TC Remark','Created At']],
        ...jRows
      ].flat()), 'JBox Issues (ACT)');
    }

    XLSX.writeFile(wb, 'CollectPro_ACT_Issues_Report_' + Utils.today() + '.xlsx');
  }
};

function useToast(){const[t,s]=useState(null);return{toast:t,showToast:(m,tp='error')=>s({msg:m,type:tp}),hideToast:()=>s(null)};}

function useAuth({onSuccess,onError}){
  const[loading,setLoading]=useState(false);
  const login=useCallback(async(city,staffId,pin)=>{
    setLoading(true);
    try{
      const d=await Api.get({action:'login',city,staffId:String(staffId).trim().toUpperCase(),pin:pin.trim()});
      if(!CONFIG.ALLOWED_ROLES.includes(d.role))throw new Error('Access denied. Admin roles only.');
      const s={token:d.token,staffId:d.staffId,staffName:d.staffName,role:d.role,city:d.city,clientId:d.clientId,loginAt:Date.now()};
      SS.save(s);onSuccess(s);
    }catch(e){
      const m=e.message.includes('Invalid')?'Invalid Staff ID or PIN':e.message.includes('attempts')?'Too many attempts. Wait 10 min.':e.message||'Login failed';
      onError(m);
    }finally{setLoading(false);}
  },[onSuccess,onError]);
  return{login,loading};
}

function useTokenRefresh(session,onExpired){
  const r=useRef(null);
  useEffect(()=>{
    if(!session)return;
    r.current=setInterval(async()=>{
      try{const d=await Api.get({action:'login',city:session.city,staffId:session.staffId,token:session.token});SS.save({...session,token:d.token,loginAt:Date.now()});}
      catch{onExpired();}
    },CONFIG.REFRESH_MS);
    return()=>clearInterval(r.current);
  },[session]);
}

// Data fetching hook
function useApiData(session, action, params, deps=[]) {
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
  const fetch=useCallback(async()=>{
    if(!session)return;
    setLoading(true);setError(null);
    try{const d=await Api.get({action,token:session.token,...(params||{})});setData(d);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[session,action,JSON.stringify(params),...deps]);
  useEffect(()=>{fetch();},[fetch]);
  return{data,loading,error,refresh:fetch};
}

function useBaseUpload(session){
  const[step,setStep]=useState('idle');
  const[progress,setProgress]=useState(0);
  const[stepLabel,setStepLabel]=useState('');
  const[parsed,setParsed]=useState(null);
  const[result,setResult]=useState(null);
  const[error,setError]=useState('');

  const reset=useCallback(()=>{setStep('idle');setProgress(0);setStepLabel('');setParsed(null);setResult(null);setError('');},[]);

  const parseFile=useCallback(async(file)=>{
    setStep('parsing');setProgress(20);setStepLabel('Reading file...');
    try{const r=await parseExcel(file);setProgress(100);setStepLabel(r.mapped+' accounts ready');setParsed(r);setStep('confirm');}
    catch(e){setError(e.message);setStep('error');}
  },[]);

  const runUpload=useCallback(async({city,batchNo,mode,autoAllocate})=>{
    if(!parsed)return;
    setStep('uploading');
    const steps=[{p:15,l:'Connecting...'},{p:30,l:'Sending '+parsed.rows.length+' accounts...'},{p:55,l:'Running duplicate filter...'},{p:70,l:'Checking Historic Memory...'},{p:85,l:'Writing clean base...'},{p:95,l:'Running allocation...'}];
    let si=0;
    const tick=setInterval(()=>{if(si<steps.length){setProgress(steps[si].p);setStepLabel(steps[si].l);si++;}},700);
    try{
      const d=await Api.post({action:'upload_base',token:session.token,city,batchNo,mode,autoAllocate,autoAllocateExec:autoAllocate,uploaderStaffId:session.staffId,allCities:[city],rows:parsed.rows});
      clearInterval(tick);setProgress(100);setStepLabel('Upload complete!');setResult(d);setStep('done');
    }catch(e){clearInterval(tick);setError(e.message);setStep('error');}
  },[parsed,session]);

  return{step,progress,stepLabel,parsed,result,error,parseFile,runUpload,reset};
}

  const {data:batchHistory} = useApiData(session,'get_batch_history',{city:result.city||'CBE'});

  const maxWorkable = useMemo(()=>{
    if(!batchHistory||!batchHistory.length)return result.workable||1;

  },[batchHistory,result]);

  return (
    <div>

          {label:'Batch Duplicate', val:result.breakdown?.dupInBatch||0,    color:'var(--amber)'},
          {label:'Historic Match',  val:result.breakdown?.historicMatch||0, color:'var(--amber)'},
          {label:'In Pipeline',     val:result.breakdown?.pendingMatch||0,  color:'var(--amber)'},

      {showConfirm && (
        <div className="confirm-overlay" onClick={()=>setShowConfirm(false)}>
          <div className="confirm-sheet" onClick={e=>e.stopPropagation()}>
            <div className="confirm-title">⚠️ Replace Mode</div>
            <div className="confirm-body">This will <strong>clear TC_Base_Clean for {city}</strong> before uploading {parsed?.mapped} new accounts. This cannot be undone.</div>
            <div className="confirm-actions">
              <button className="confirm-cancel" onClick={()=>setShowConfirm(false)}>Cancel</button>
              <button className="confirm-proceed" onClick={doRun}>Yes, Replace</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  👥 TEAM TAB
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const {data:lb}                     = useApiData(session,'get_leaderboard',{city:session.city});

  const idleTCs = useMemo(()=>team?team.filter(t=>(t.callsToday||0)===0):[], [team]);

        lb?.map((tc,i)=>(
          <div key={i} className={`lb-row${tc.staffId===session.staffId?' lb-me':''}`}>
            <div className={`lb-rank${i<3?' r'+(i+1):' rx'}`}>{i<3?['🥇','🥈','🥉'][i]:i+1}</div>
            <div className="lb-info">
              <div className="lb-name">{tc.name}{tc.staffId===session.staffId&&<span className="me-tag">YOU</span>}</div>
              <div className="lb-id">{tc.staffId} · ₹{tc.mtdEarned||0}</div>
            </div>
            <div className="lb-bar-wrap"><div className="lb-bar" style={{width:Math.round((tc.mtdCollected/maxColl)*100)+'%'}}/></div>
            <div className="lb-count">{tc.mtdCollected||0}</div>

      {/* Per TC stats */}
      <div className="section-title" style={{marginTop:8}}>📊 Team Details</div>
      {loading ? [1,2].map(i=><Skel key={i} h={80} mb={8}/>) : (
        team?.map((tc,i)=>(
          <div key={i} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div>
                <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:700}}>{tc.name}</div>
                <div style={{fontSize:11,fontFamily:'var(--fm)',color:'var(--text3)'}}>{tc.staffId}</div>
              </div>
              <span className={`badge ${(tc.callsToday||0)>0?'green':'red'}`}>{(tc.callsToday||0)>0?'Active today':'Idle today'}</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,textAlign:'center'}}>
              {[
                {l:'Assigned',  v:tc.total||0},
                {l:'Called',    v:tc.called||0},
                {l:'Appt',      v:tc.apptFixed||0},

              ].map(s=>(
                <div key={s.l} style={{background:'var(--bg3)',borderRadius:8,padding:'8px 4px'}}>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📋 PENDING TAB
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PendingTab = ({ session }) => {
  const [filter, setFilter] = useState('ALL');
  const {data:accounts, loading, refresh} = useApiData(session,'get_tc_accounts',{city:session.city,staffId:'ALL'});

  const today = Utils.today();

  const filtered = useMemo(()=>{
    if(!accounts)return[];
    return accounts.filter(a=>{
      const terminal=['COLLECTED','NR_OWN','NR_WRONG_NO','NR_ADDR','STRIKE_3'];
      if(terminal.includes(a.status))return false;
      if(filter==='ALL')return true;
      if(filter==='AGING')return Utils.hoursAgo(a.pendingSince||a.pending_since)>=48;
      if(filter==='OVERDUE')return a.apptDate&&a.apptDate<today&&a.status==='APPT_FIXED';
      if(filter==='ISSUES')return a.status.startsWith('ISSUE_');
      return a.status===filter;
    });
  },[accounts,filter,today]);

  const chips=[
    {id:'ALL',label:'All'},
    {id:'AGING',label:'⏱ Aging >48h'},
    {id:'OVERDUE',label:'🔴 Overdue'},
    {id:'APPT_FIXED',label:'Appt Fixed'},
    {id:'FRESH',label:'Fresh'},
    {id:'ISSUES',label:'Issues'},
  ];

  const getUrgency=(a)=>{
    const h=Utils.hoursAgo(a.pendingSince||a.pending_since);
    if(a.apptDate&&a.apptDate<today&&a.status==='APPT_FIXED')return'overdue';
    if(h>=48)return'aging';
    return'normal';
  };

  return (
    <div className="wrap">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div className="section-title" style={{margin:0}}>📋 Pending Accounts</div>
        <button onClick={refresh} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--accent)',fontFamily:'var(--fm)'}}>↻ Refresh</button>
      </div>

      <div className="filter-chips">
        {chips.map(c=><div key={c.id} className={`chip${filter===c.id?' on':''}`} onClick={()=>setFilter(c.id)}>{c.label}</div>)}
      </div>

      <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--fm)',marginBottom:12}}>
        {loading?'Loading...':filtered.length+' accounts'}
      </div>

      {loading?[1,2,3].map(i=><Skel key={i} h={100} mb={10}/>):(
        filtered.length===0
          ? <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)',fontSize:13,fontFamily:'var(--fm)'}}>No accounts match this filter</div>
          : filtered.slice(0,30).map((a,i)=>{
            const urg=getUrgency(a);
            const ageH=Utils.hoursAgo(a.pendingSince||a.pending_since);
            return(
              <div key={i} className={`pending-card ${urg}`}>
                <div className="pc-top">
                  <div>
                    <div className="pc-accno">{a.accountNo||a.account_no}</div>
                    <div className="pc-name">{a.name}</div>
                    <div className="pc-phone">{a.mobile}</div>
                  </div>
                  <span className={`badge ${urg==='overdue'?'red':urg==='aging'?'amber':'blue'}`}>
                    {urg==='overdue'?'Overdue':urg==='aging'?Utils.fmtHours(ageH):STATUS_LABELS[a.status]||a.status}
                  </span>
                </div>
                <div className="pc-meta">
                  <span className="pc-area">{a.area}</span>
                  {a.apptDate&&<span className="pc-area" style={{color:'var(--green)'}}>📅 {a.apptDate}</span>}
                  {a.tcId&&<span className="pc-area">{a.tcId}</span>}
                  {a.execId&&<span className="pc-area">{a.execId}</span>}
                </div>
              </div>
            );
          })
      )}
      {!loading&&filtered.length>30&&<div style={{textAlign:'center',fontSize:12,color:'var(--text3)',fontFamily:'var(--fm)',paddingBottom:8}}>Showing 30 of {filtered.length} · See full list in Accounts module</div>}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ⚠️ ISSUES TAB
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const IssuesTab = ({ session, showToast }) => {
  const [typeFilter, setTypeFilter] = useState('ALL');
  // Fetch issues via get_admin_overview or dedicated action
  // For now using mock structure — Phase 7 wires to real issues API
  const {data:rawIssues, loading, refresh} = useApiData(session,'get_tc_accounts',{city:session.city,staffId:'ALL'});

  // Extract issue-type accounts from TC accounts
  const issues = useMemo(()=>{
    if(!rawIssues)return[];
    return rawIssues.filter(a=>a.status&&a.status.startsWith('ISSUE_')).map(a=>({
      issueId:      a.accountNo||a.account_no,
      accountNo:    a.accountNo||a.account_no,
      customerName: a.name,
      mobile:       a.mobile,
      area:         a.area,
      city:         a.city||session.city,
      issueType:    a.status,
      tcRemark:     a.tcRemark||a.tc_remark||'',
      status:       'Open',
      createdAt:    a.pendingSince||a.pending_since||'',
    }));
  },[rawIssues]);

  const filtered = useMemo(()=>{
    if(typeFilter==='ALL')return issues;
    return issues.filter(i=>i.issueType===typeFilter);
  },[issues,typeFilter]);

  // Count by type
  const counts = useMemo(()=>{
    const c={};
    ISSUE_TYPES.forEach(t=>{c[t.id]=t.id==='ALL'?issues.length:issues.filter(i=>i.issueType===t.id).length;});
    return c;
  },[issues]);

  return (
    <div className="wrap">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div className="section-title" style={{margin:0}}>⚠️ Open Issues</div>
        <button onClick={()=>ExcelExport.downloadIssuesReport(issues)} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#fff',padding:'6px 12px',fontFamily:'var(--fh)',fontSize:11,fontWeight:700,cursor:'pointer'}}>
          📥 ACT Report
        </button>
      </div>

      {/* Type filter chips */}
      <div className="issue-type-tabs">
        {ISSUE_TYPES.map(t=>(
          <div key={t.id} className={`it-chip${typeFilter===t.id?' on':''}`} onClick={()=>setTypeFilter(t.id)}>
            {t.label} {counts[t.id]>0&&<span style={{fontFamily:'var(--fm)',fontWeight:800}}>({counts[t.id]})</span>}
          </div>
        ))}
      </div>

      {/* Summary card */}
      {!loading && issues.length > 0 && (
        <div className="card" style={{marginBottom:14}}>
          <div className="card-title">📊 Issue Summary</div>
          {ISSUE_TYPES.slice(1).map(t=>(
            counts[t.id]>0 && (
              <div key={t.id} className="row">
                <span className="row-label">{t.label}</span>
                <span className={`badge ${t.id==='ISSUE_JBOX'?'purple':t.id==='ISSUE_REFUND'?'amber':'blue'}`}>{counts[t.id]}</span>
              </div>
            )
          ))}
        </div>
      )}

      <div style={{fontSize:11,color:'var(--text3)',fontFamily:'var(--fm)',marginBottom:12}}>
        {loading?'Loading...':filtered.length+' issues'}
      </div>

      {loading?[1,2,3].map(i=><Skel key={i} h={110} mb={10}/>):(
        filtered.length===0
          ? <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)',fontSize:13,fontFamily:'var(--fm)'}}>{issues.length===0?'No open issues ✅':'No issues of this type'}</div>
          : filtered.map((issue,i)=>(
            <div key={i} className="issue-card">
              <span className={`issue-type-badge ${ISSUE_SHORT[issue.issueType]||'ISSUE'}`}>
                {issue.issueType?.replace('ISSUE_','')?.replace('_',' ')||'Issue'}
              </span>
              <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:800,color:'var(--text)',marginBottom:2}}>{issue.accountNo}</div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:2}}>{issue.customerName}</div>
              <div style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--green)',marginBottom:4}}>{issue.mobile}</div>
              {issue.tcRemark&&<div className="issue-remark">💬 {issue.tcRemark}</div>}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6}}>
                <div>
                  <span className="pc-area">{issue.area}</span>
                </div>
                <button className="resolve-btn" onClick={()=>showToast('Issue resolution in Phase 7','warning')}>
                  ✓ Resolve
                </button>
              </div>
            </div>
          ))
      )}

      {/* Download button */}
      {issues.length > 0 && (
        <button className="btn-excel" onClick={()=>ExcelExport.downloadIssuesReport(issues)}>
          📥 Download ACT Issues Report (.xlsx)
        </button>
      )}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ⚙️ CONTROL TAB
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ControlTab = ({ session, showToast }) => {
  const [showRolloverConfirm, setShowRolloverConfirm] = useState(false);
  const [rolloverPreview,     setRolloverPreview]     = useState(null);
  const [rolling,             setRolling]             = useState(false);
  const {data:cooling, loading:coolLoad, refresh:coolRefresh} = useApiData(session,'get_cooling_pool',{city:session.city});

  const loadPreview = async() => {
    try{
      const d=await Api.get({action:'preview_rollover',token:session.token,city:session.city});
      setRolloverPreview(d);setShowRolloverConfirm(true);
    }catch(e){showToast(e.message,'error');}
  };

  const doRollover = async() => {
    setRolling(true);setShowRolloverConfirm(false);
    try{
      await Api.post({action:'run_rollover',token:session.token,city:session.city});
      showToast('Monthly rollover complete!','success');
      setRolloverPreview(null);
    }catch(e){showToast(e.message,'error');}
    finally{setRolling(false);}
  };

  const releaseAccount = async(accountNo) => {
    try{
      await Api.post({action:'release_cooling',token:session.token,accountNo,city:session.city});
      showToast(accountNo+' released from cooling','success');
      coolRefresh();
    }catch(e){showToast(e.message,'error');}
  };

  const today = Utils.today();

  return (
    <div className="wrap">

      {/* Cooling Pool */}
      <div className="section-title">❄️ Cooling Pool</div>
      {coolLoad?[1,2].map(i=><Skel key={i} h={80} mb={8}/>):(
        !cooling||cooling.length===0
          ? <div className="alert-card green" style={{marginBottom:14}}><div className="alert-icon">✅</div><div><div className="alert-title">Cooling pool is empty</div><div className="alert-sub">No accounts in cooling</div></div></div>
          : cooling.filter(a=>a.state!=='Released').map((a,i)=>{
            const overdue=a.releaseAfter&&a.releaseAfter<today;
            return(
              <div key={i} className={`cooling-card${overdue?' overdue':''}`}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div>
                    <div style={{fontFamily:'var(--fh)',fontSize:14,fontWeight:800}}>{a.accountNo}</div>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{a.name}</div>
                    <div style={{fontSize:11,fontFamily:'var(--fm)',color:'var(--text3)'}}>{a.reason} · Release: {a.releaseAfter}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className={`days-left ${overdue?'over':'ok'}`}>{overdue?'Overdue':(a.daysLeft||0)+'d'}</div>
                    <button className="release-btn" onClick={()=>releaseAccount(a.accountNo)}>Release</button>
                  </div>
                </div>
                <div className="pc-meta"><span className="pc-area">{a.area}</span><span className="pc-area">{a.assignedTC}</span></div>
              </div>
            );
          })
      )}

      {/* Monthly Rollover */}
      <div className="section-title" style={{marginTop:8}}>🗂️ Monthly Rollover</div>
      <div className="card">
        <div className="card-title">End of Month Archive</div>
        <div className="row"><span className="row-label">Archives</span><span className="row-val">TC_Base_Raw · TC_Base_Clean · TC_Calls</span></div>
        <div className="row"><span className="row-label">Preserved</span><span className="row-val green">Pending · Collected · Historic_Memory</span></div>
        <div className="row"><span className="row-label">Resets</span><span className="row-val amber">MTD incentive counts</span></div>
      </div>

      <button className="btn-primary" onClick={loadPreview} disabled={rolling}>
        {rolling?<><div className="spinner"/>Running Rollover...</>:'🗂️ Preview & Run Monthly Rollover'}
      </button>

      {showRolloverConfirm && rolloverPreview && (
        <div className="confirm-overlay" onClick={()=>setShowRolloverConfirm(false)}>
          <div className="confirm-sheet" onClick={e=>e.stopPropagation()}>
            <div className="confirm-title">🗂️ Monthly Rollover Preview</div>
            <div className="rollover-preview">
              <div className="rollover-row"><span>City</span><strong>{rolloverPreview.city}</strong></div>
              <div className="rollover-row"><span>To Archive</span><strong>{rolloverPreview.toArchive} rows</strong></div>
              <div className="rollover-row"><span>Collected</span><strong style={{color:'var(--green)'}}>{rolloverPreview.collected}</strong></div>
              <div className="rollover-row"><span>Pending (kept)</span><strong style={{color:'var(--amber)'}}>{rolloverPreview.pending}</strong></div>
              <div className="rollover-row"><span>Historic will grow by</span><strong>{rolloverPreview.historicWillGrow}</strong></div>
            </div>
            <div className="confirm-body" style={{marginBottom:16}}>This will archive this month's data and reset the pipeline. Pending accounts are preserved.</div>
            <div className="confirm-actions">
              <button className="confirm-cancel" onClick={()=>setShowRolloverConfirm(false)}>Cancel</button>
              <button className="confirm-proceed" onClick={doRollover}>Run Rollover</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const pages = {

    pending: <PendingTab session={session}/>,

  return (
    <div className="app">
      <div className="header">
        <div className="brand">

          <span className="brand-name">CollectPro</span>
          <span className="brand-role">ADMIN</span>
        </div>
        <div className="hdr-right">
          <span className="city-badge">{session.city}</span>
          <span className="staff-badge">{Utils.name1(session.staffName)}</span>
          <button className="logout-btn" onClick={handleLogout}>✕</button>
        </div>
      </div>
      <div className="main-content">
        {NAV_TABS.map(n=>(
          <div key={n.id} className={`page${activePage===n.id?' on':''}`}>{pages[n.id]}</div>
        ))}
      </div>
      <div className="bnav">
        {NAV_TABS.map(n=>(
          <button key={n.id} className={`ni${activePage===n.id?' on':''}`} onClick={()=>setActivePage(n.id)}>
            <span className="ico">{n.icon}</span>{n.label}
          </button>
        ))}

      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={hideToast}/>}

  );
};

//  LOGIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LoginCard = ({ onLogin }) => {
  const[city,setCity]=useState('CBE');const[staffId,setStaffId]=useState('');
  const[pin,setPin]=useState('');const[error,setError]=useState('');const[shaking,setShaking]=useState(false);
  const{toast,showToast,hideToast}=useToast();
  const shake=useCallback(()=>{setShaking(true);setTimeout(()=>setShaking(false),450);},[]);
  const{login,loading}=useAuth({onSuccess:onLogin,onError:(m)=>{shake();setError(m);showToast(m,'error');setPin('');}});
  const sub=useCallback(()=>{if(!staffId.trim()){showToast('Enter your Staff ID');return;}if(pin.length<4){showToast('Enter your 4-digit PIN');return;}setError('');login(city,staffId,pin);},[city,staffId,pin,login]);
  useEffect(()=>{if(pin.length===4&&staffId.trim()){const t=setTimeout(sub,80);return()=>clearTimeout(t);}},[pin,staffId]);
  return(
    <div className="login-screen">
      <div className={`login-card${shaking?' shake':''}`}>
        <div className="login-logo-wrap">
          <BrandLogo size="lg"/>
          <div className="login-title">Admin Console</div>
          <div className="login-sub">CollectPro · VOA Recovery Operations</div>
          <div className="role-pill">🛡️ Admin Portal</div>
        </div>
        <div className="form-group"><label className="form-label">City</label>
          <div className="select-wrap"><select className="form-select" value={city} onChange={e=>setCity(e.target.value)} disabled={loading}>
            <option value="CBE">Coimbatore (CBE)</option><option value="CHN">Chennai (CHN)</option>
          </select></div></div>
        <div className="form-group"><label className="form-label">Staff ID</label>
          <input className="form-input" type="text" value={staffId} onChange={e=>setStaffId(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&sub()} placeholder="e.g. AD_001" autoCapitalize="characters" autoCorrect="off" spellCheck={false} disabled={loading}/>
        </div>
        <div className="form-group" style={{marginBottom:8}}><label className="form-label">PIN</label>
          <input className="form-input pin-field" type="password" inputMode="numeric" pattern="[0-9]*" maxLength={4} value={pin} onChange={e=>setPin(Utils.pin(e.target.value))} onKeyDown={e=>e.key==='Enter'&&sub()} placeholder="• • • •" disabled={loading}/>
        </div>
        <PinDots length={pin.length}/>
        <button className="btn-login" onClick={sub} disabled={loading}>
          {loading?<><div className="spinner"/><span>Signing in...</span></>:'Sign In →'}
        </button>
        {error&&<div className="login-error">{error}</div>}
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={hideToast}/>}
    </div>
  );
};

// ROOT
const App=()=>{
  const[session,setSession]=useState(null);const[checking,setChecking]=useState(true);
  useEffect(()=>{const s=SS.load();if(s)setSession(s);setChecking(false);},[]);
  if(checking)return<div className="load-overlay"><div className="load-spinner"/><div className="load-text">CollectPro loading...</div></div>;
  return session?<AppShell session={session} onLogout={()=>setSession(null)}/>:<LoginCard onLogin={s=>setSession(s)}/>;
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
